<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>麻將胡了 Slot</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="machine" aria-label="麻將胡了 slot game">
        <header class="topbar">
          <div class="brand-lockup">
            <div class="seal" aria-hidden="true">胡</div>
            <div>
              <p class="kicker">Mahjong Ways Demo</p>
              <h1>麻將胡了</h1>
            </div>
          </div>
          <div class="top-actions">
            <button class="icon-button" id="soundToggle" type="button" aria-label="切換音效" title="切換音效">
              <span id="soundIcon">♪</span>
            </button>
            <button class="icon-button" id="rulesToggle" type="button" aria-label="查看賠付表" title="查看賠付表">
              <span>?</span>
            </button>
          </div>
        </header>

        <div class="jackpot-row" aria-live="polite">
          <div>
            <span>今日牌局</span>
            <strong id="roundCount">0</strong>
          </div>
          <div>
            <span>最高胡牌</span>
            <strong id="bestWin">0</strong>
          </div>
          <div>
            <span>免費旋轉</span>
            <strong id="freeSpins">0</strong>
          </div>
        </div>

        <section class="reels-wrap">
          <canvas id="winCanvas" class="win-canvas" width="980" height="560" aria-hidden="true"></canvas>
          <div class="win-banner" id="winBanner" aria-live="polite">
            <span id="winTitle">準備開局</span>
            <strong id="winAmount">按下開始</strong>
          </div>
          <div class="reels" id="reels" aria-label="五軸三行麻將 slot reels"></div>
        </section>

        <section class="controls" aria-label="遊戲控制">
          <div class="meter">
            <span>餘額</span>
            <strong id="balance">5000</strong>
          </div>
          <div class="bet-control">
            <button class="step-button" id="betDown" type="button" aria-label="減少下注">−</button>
            <label>
              <span>下注</span>
              <input id="betInput" type="number" min="10" max="500" step="10" value="50" />
            </label>
            <button class="step-button" id="betUp" type="button" aria-label="增加下注">+</button>
          </div>
          <button class="spin-button" id="spinButton" type="button">
            <span class="spin-label">開始</span>
            <span class="spin-sub">SPIN</span>
          </button>
          <button class="auto-button" id="autoButton" type="button">自動</button>
        </section>

        <section class="status-strip" aria-live="polite">
          <span id="statusText">湊齊三張以上同牌即可胡牌，花牌可代替任意普通牌。</span>
        </section>
      </section>

      <aside class="paytable" id="paytable" aria-label="賠付表">
        <div class="panel-heading">
          <h2>賠付表</h2>
          <button class="icon-button close-rules" id="closeRules" type="button" aria-label="關閉賠付表">×</button>
        </div>
        <div class="pay-list" id="payList"></div>
        <div class="rules-copy">
          <p>連線從左至右計算。花牌為 Wild，可替代萬、筒、索、風、龍牌。三個以上發財 Scatter 觸發免費旋轉。</p>
          <p>此頁為娛樂 demo，不連接真實錢包或下注系統。</p>
        </div>
      </aside>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
